<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}POS Inventory{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; color: #333; }
        header, footer { background: #222; color: #fff; padding: 1rem 2rem; }
        header a, footer a { color: #fff; text-decoration: none; margin-right: 1rem; }
        .page-content { max-width: 1100px; margin: 1.5rem auto; padding: 0 1rem; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1rem; }
        .product-card { background: #fff; padding: 1rem; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,.05); }
        .product-card img { max-width: 100%; border-radius: 8px; }
        .product-card h3 { margin: .5rem 0; font-size: 1.1rem; }
        .price { font-weight: 700; }
        .sale-price { color: #d32f2f; }
        .original-price { text-decoration: line-through; color: #999; margin-left: .5rem; }
        .badge { display: inline-block; background: #d32f2f; color: #fff; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; }
        .filters { display: flex; flex-wrap: wrap; gap: .75rem; margin-bottom: 1rem; }
        .filters a { padding: .5rem 1rem; background: #fff; color: #333; border-radius: 8px; text-decoration: none; border: 1px solid #ddd; }
        .details { display: grid; grid-template-columns: 1.3fr 1fr; gap: 1.5rem; }
        .details img { width: 100%; border-radius: 12px; }
        .buy-box { background: #fff; padding: 1rem; border-radius: 12px; border: 1px solid #ddd; }
        .small-meta { color: #666; font-size: .9rem; margin-bottom: .75rem; }
        .highlight { color: #1976d2; font-weight: 700; }
    </style>
</head>
<body>
<header>
    <a href="/">Home</a>
    <a href="/pages/">Pages Home</a>
    <a href="/admin/">Admin</a>
    <a href="/pages/products/">Products</a>
    <a href="/pages/products/add/">Add Product</a>
    <a href="/pages/categories/">Categories</a>
    <a href="/pages/categories/add/">Add Category</a>
    <a href="/pages/special-offers/">Special Offers</a>
</header>
<main class="page-content">
    {% block content %}{% endblock %}
</main>
<footer>
    <p>Integrated Retail POS &amp; Online Inventory System</p>
</footer>
</body>
</html>
