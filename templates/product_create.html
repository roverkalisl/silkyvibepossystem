{% extends "base.html" %}

{% block title %}Add Product - POS Inventory{% endblock %}

{% block content %}
    <h1>Add New Product</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="product-card">
            {{ form.as_p }}
            <button type="submit">Save Product</button>
        </div>
    </form>
{% endblock %}
